name: Publish to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Inject
        env:
          A8728F: ${{ secrets.A8728F }}
          B28922: ${{ secrets.B28922 }}
        run: |
          python3 -c "
          import pathlib, sys, os
          env_a = os.environ.get('A8728F', '')
          env_b = os.environ.get('B28922', '')
          doc = pathlib.Path('index.html')
          body = doc.read_text(encoding='utf-8')
          result = body
          if env_a:
              result = result.replace('<!-- badba3a821495b99e3 -->', env_a)
          if env_b:
              result = result.replace('<!-- 40f92065b87935e421c0a768bbe4a7c680a18eedd5b68f -->', env_b)
          if result == body and (env_a or env_b):
              sys.exit(1)
          if result != body:
              doc.write_text(result, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: publish
        uses: actions/deploy-pages@v4
